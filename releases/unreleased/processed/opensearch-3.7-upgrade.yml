---
title: OpenSearch 3.7 upgrade
category: added
author: Jose Javier Merchante <jjmerchante@bitergia.com>
issue: null
notes: >
  Update base image for Bitergia Analytics OpenSearch to 3.7.
  OpenSearch 3.7 brings significant improvements in Analytics Engine
  with expanded Pipeline Query Language (PPL) support, Tiered Storage
  (WritableWarm) implementation for warm storage tiering, and Pluggable
  Data Formats for multi-format indexing. It also includes performance
  improvements.
